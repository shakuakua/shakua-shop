# 电商平台 Nginx 配置
# 将此文件复制到服务器: /etc/nginx/sites-available/shop
# 然后执行: sudo ln -s /etc/nginx/sites-available/shop /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # 改为你的域名或服务器IP

    # 前端静态文件 + API 统一由 Flask 处理
    # Nginx 作为反向代理，将请求转发给 Gunicorn

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态文件缓存（可选：让 Nginx 直接处理静态文件提升性能）
    location /assets/ {
        alias /home/ubuntu/shop/frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件大小限制
    client_max_body_size 10M;
}
